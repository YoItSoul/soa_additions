    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="bloodmagic"
    mandatory=false
    versionRange="[1.20.1-3.3.0,)"
    ordering="AFTER"
    side="BOTH"
