name: Bug Report
description: Report a bug or crash
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Open the quest book
        2. Right-click a chapter
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Crash log / relevant log output
      description: Paste the crash report or relevant log lines here.
      render: text
    validations:
      required: false
