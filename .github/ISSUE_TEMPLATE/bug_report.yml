name: Bug Report
description: Report a bug or crash with SoA Additions
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below so we can reproduce and fix it.

  - type: input
    id: mc-version
    attributes:
      label: Minecraft Version
      placeholder: "1.20.1"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Mod Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: input
    id: forge-version
    attributes:
      label: Forge Version
      placeholder: "e.g. 47.2.0"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      placeholder: |
        1. Open the quest book
        2. Right-click a chapter
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Crash log / relevant log output
      description: Paste the crash report or relevant log lines here.
      render: text
    validations:
      required: false

  - type: textarea
    id: other-mods
    attributes:
      label: Other mods installed
      description: List any other mods that might be relevant.
    validations:
      required: false
